version: "2"
run:
  tests: false

formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
  settings:
    gofumpt:
      extra-rules: true
  exclusions:
    generated: lax

linters:
  default: all
  disable:
    - depguard
    - err113
    - exhaustive
    - exhaustruct
    - forcetypeassert
    - funcorder
    - funlen
    - gochecknoglobals
    - gochecknoinits
    - gomoddirectives
    - ireturn
    - mnd
    - musttag
    - nilerr
    - nlreturn
    - noinlineerr
    - nonamedreturns
    - varnamelen
    - wrapcheck
    - wsl
    - wsl_v5
  settings:
    cyclop:
      max-complexity: 20
    gosec:
      excludes:
        - G103
        - G115
        - G304
    lll:
      line-length: 160
    perfsprint:
      error-format: false
  exclusions:
    generated: lax
